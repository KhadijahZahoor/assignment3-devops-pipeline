server {
    listen 80;

    location / {
        return 200 "Nginx reverse proxy is running\n";
        add_header Content-Type text/plain;
    }

    location /health {
        proxy_pass http://flask-api:5000/health;
    }

    location /api/ {
        proxy_pass http://flask-api:5000/api/;
    }
}
